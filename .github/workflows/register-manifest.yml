name: Register Agent Manifest

on:
  issues:
    types: [opened]

jobs:
  register:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract JSON from issue
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 <<'PY'
          import os
          import re

          body = os.environ["ISSUE_BODY"]

          match = re.search(r"```json\s*(.*?)\s*```", body, re.DOTALL)
          if not match:
              raise SystemExit("No JSON block found in issue body.")

          json_text = match.group(1).strip()

          if not json_text:
              raise SystemExit("Extracted JSON block is empty.")

          with open("manifest.json", "w", encoding="utf-8") as f:
              f.write(json_text)
          PY

      - name: Validate manifest structure
        run: |
          python3 <<'PY'
          import json

          required_fields = [
              "$schema",
              "specVersion",
              "identity",
              "purpose",
              "capabilities",
              "boundaries",
              "autonomy_level",
              "declaration_date"
          ]

          with open("manifest.json", encoding="utf-8") as f:
              data = json.load(f)

          missing = [field for field in required_fields if field not in data]
          if missing:
              raise SystemExit("Missing required fields: " + ", ".join(missing))

          if not isinstance(data["capabilities"], list):
              raise SystemExit("Field 'capabilities' must be a list.")

          if not isinstance(data["boundaries"], list):
              raise SystemExit("Field 'boundaries' must be a list.")

          print("Manifest structure OK")
          PY

      - name: Get date
        id: date
        run: |
          echo "year=$(date +%Y)" >> $GITHUB_OUTPUT
          echo "month=$(date +%m)" >> $GITHUB_OUTPUT

      - name: Get identity
        id: identity
        run: |
          NAME=$(python3 -c "import json; print(json.load(open('manifest.json', encoding='utf-8'))['identity'])")
          SAFE_NAME=$(echo "$NAME" | tr '[:upper:]' '[:lower:]' | sed 's/ /-/g')
          echo "name=$SAFE_NAME" >> $GITHUB_OUTPUT

      - name: Move manifest
        run: |
          mkdir -p manifests/${{ steps.date.outputs.year }}/${{ steps.date.outputs.month }}
          mv manifest.json manifests/${{ steps.date.outputs.year }}/${{ steps.date.outputs.month }}/${{ steps.identity.outputs.name }}.json

      - name: Commit manifest
        run: |
          git config user.name "manifest-bot"
          git config user.email "bot@agent-manifest.local"
          git add .
          git commit -m "auto-register manifest from issue #${{ github.event.issue.number }}" || echo "No changes"
          git push
