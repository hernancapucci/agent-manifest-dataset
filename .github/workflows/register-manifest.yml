name: Register Agent Manifest

on:
  issues:
    types: [opened]

jobs:
  register:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Extract JSON from issue
        run: |
          echo "${{ github.event.issue.body }}" > issue_body.txt
          sed -n '/```json/,/```/p' issue_body.txt | sed '1d;$d' > manifest.json

      - name: Show extracted JSON
        run: cat manifest.json

      - name: Get date
        id: date
        run: |
          echo "year=$(date +%Y)" >> $GITHUB_OUTPUT
          echo "month=$(date +%m)" >> $GITHUB_OUTPUT

      - name: Get identity
        id: identity
        run: |
          NAME=$(grep '"identity"' manifest.json | head -1 | sed 's/.*: "\(.*\)".*/\1/')
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Move manifest
        run: |
          mkdir -p manifests/${{ steps.date.outputs.year }}/${{ steps.date.outputs.month }}
          mv manifest.json manifests/${{ steps.date.outputs.year }}/${{ steps.date.outputs.month }}/${{ steps.identity.outputs.name }}.json

      - name: Commit manifest
        run: |
          git config --global user.name "manifest-bot"
          git config --global user.email "bot@agent-manifest"
          git add .
          git commit -m "auto-register manifest"
          git push
