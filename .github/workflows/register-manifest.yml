name: Register Agent Manifest

on:
  issues:
    types: [opened]

jobs:
  register:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract JSON from issue
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 <<'PY'
          import os
          import re

          body = os.environ["ISSUE_BODY"]

          match = re.search(r"```json\s*(.*?)\s*```", body, re.DOTALL)
          if not match:
              raise SystemExit("No JSON block found in issue body.")

          json_text = match.group(1).strip()

          if not json_text:
              raise SystemExit("Extracted JSON block is empty.")

          with open("manifest.json", "w", encoding="utf-8") as f:
              f.write(json_text)
          PY

      - name: Validate manifest structure
        run: |
          python3 <<'PY'
          import json

          required_fields = [
              "$schema",
              "specVersion",
              "identity",
              "purpose",
              "capabilities",
              "boundaries",
              "autonomy_level",
              "declaration_date"
          ]

          with open("manifest.json", encoding="utf-8") as f:
              data = json.load(f)

          missing = [field for field in required_fields if field not in data]
          if missing:
              raise SystemExit("Missing required fields: " + ", ".join(missing))

          if not isinstance(data["capabilities"], list):
              raise SystemExit("Field 'capabilities' must be a list.")

          if not isinstance(data["boundaries"], list):
              raise SystemExit("Field 'boundaries' must be a list.")

          print("Manifest structure OK")
          PY

      - name: Get date
        id: date
        run: |
          echo "year=$(date +%Y)" >> $GITHUB_OUTPUT
          echo "month=$(date +%m)" >> $GITHUB_OUTPUT

      - name: Get identity
        id: identity
        run: |
          NAME=$(python3 -c "import json; print(json.load(open('manifest.json', encoding='utf-8'))['identity'])")
          SAFE_NAME=$(echo "$NAME" | tr '[:upper:]' '[:lower:]' | sed 's/ /-/g')
          echo "name=$SAFE_NAME" >> $GITHUB_OUTPUT

      - name: Move manifest
        run: |
          mkdir -p manifests/${{ steps.date.outputs.year }}/${{ steps.date.outputs.month }}
          mv manifest.json manifests/${{ steps.date.outputs.year }}/${{ steps.date.outputs.month }}/${{ steps.identity.outputs.name }}.json

      - name: Generate registry.json
        run: |
          python3 <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          repo_url = "https://github.com/hernancapucci/agent-manifest-dataset"
          raw_base = "https://raw.githubusercontent.com/hernancapucci/agent-manifest-dataset/main/"

          agents = []

          for root, dirs, files in os.walk("manifests"):
              for file in files:
                  if not file.endswith(".json"):
                      continue

                  path = os.path.join(root, file).replace("\\", "/")

                  with open(path, "r", encoding="utf-8") as f:
                      data = json.load(f)

                  agents.append({
                      "identity": data.get("identity"),
                      "declaration_date": data.get("declaration_date"),
                      "manifest_path": path,
                      "manifest_url": raw_base + path
                  })

          agents.sort(key=lambda x: x["manifest_path"])

          registry = {
              "registry_version": "1.0",
              "generated_at": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
              "registry_type": "agent-manifest-public-registry",
              "source_repository": repo_url,
              "total_agents": len(agents),
              "agents": agents
          }

          with open("registry.json", "w", encoding="utf-8") as f:
              json.dump(registry, f, indent=2)
          PY

      - name: Commit manifest and registry
        run: |
          git config user.name "manifest-bot"
          git config user.email "bot@agent-manifest.local"
          git add manifests registry.json
          git commit -m "auto-register manifest from issue #${{ github.event.issue.number }}" || echo "No changes"
          git push

      - name: Comment and close issue on success
        if: success()
        uses: actions/github-script@v7
        env:
          REGISTERED_PATH: manifests/${{ steps.date.outputs.year }}/${{ steps.date.outputs.month }}/${{ steps.identity.outputs.name }}.json
        with:
          script: |
            const registeredPath = process.env.REGISTERED_PATH;

            const successBody = [
              "Registration processed successfully.",
              "",
              "The manifest has been added to the public dataset and the registry index has been updated.",
              "",
              "Registered manifest:",
              registeredPath
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: successBody
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            });

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const failureBody = [
              "Manifest registration failed.",
              "",
              "The submitted manifest could not be processed automatically.",
              "",
              "Please review the workflow logs in Actions, correct the issue body if needed, and submit a new manifest.",
              "",
              "Common causes:",
              "- missing ```json code block",
              "- invalid JSON",
              "- missing required fields",
              "- capabilities or boundaries not formatted as arrays"
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: failureBody
            });
